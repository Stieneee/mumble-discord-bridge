name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
      PKG_CONFIG_PATH: /home/runner/.local/lib/pkgconfig
      LD_LIBRARY_PATH: /home/runner/.local/lib

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopus-dev libopusfile-dev cmake g++

      - name: Install libdave
        run: |
          git clone https://github.com/disgoorg/godave /tmp/godave
          cd /tmp/godave
          chmod +x scripts/libdave_install.sh
          SHELL=/bin/bash ./scripts/libdave_install.sh v1.1.1

      - name: Tidy and download Go modules
        run: go mod tidy

      - name: Build
        run: go build -v ./...

      - name: Run tests with race detector
        run: go test -race -v -timeout 120s ./...

      - name: Run tests with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./internal/bridge ./pkg/bridgelib

      - name: Upload coverage to artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  race-stress-test:
    runs-on: ubuntu-latest
    needs: test
    env:
      CGO_ENABLED: "1"
      PKG_CONFIG_PATH: /home/runner/.local/lib/pkgconfig
      LD_LIBRARY_PATH: /home/runner/.local/lib

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopus-dev libopusfile-dev cmake g++

      - name: Install libdave
        run: |
          git clone https://github.com/disgoorg/godave /tmp/godave
          cd /tmp/godave
          chmod +x scripts/libdave_install.sh
          SHELL=/bin/bash ./scripts/libdave_install.sh v1.1.1

      - name: Tidy and download Go modules
        run: go mod tidy

      - name: Run stress tests (10 iterations)
        run: go test -race -count=10 -timeout 300s ./internal/bridge ./pkg/bridgelib

  lint:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
      PKG_CONFIG_PATH: /home/runner/.local/lib/pkgconfig
      LD_LIBRARY_PATH: /home/runner/.local/lib

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopus-dev libopusfile-dev cmake g++

      - name: Install libdave
        run: |
          git clone https://github.com/disgoorg/godave /tmp/godave
          cd /tmp/godave
          chmod +x scripts/libdave_install.sh
          SHELL=/bin/bash ./scripts/libdave_install.sh v1.1.1

      - name: Tidy modules
        run: go mod tidy

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8.0
          args: --timeout=5m
